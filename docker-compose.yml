services:
    maccy-gdrive:
        image: rclone/rclone:1.73.3
        container_name: maccy_sync_worker
        restart: unless-stopped
        init: true
        security_opt:
            - no-new-privileges:true
        cap_drop:
            - ALL
        read_only: true
        tmpfs:
            - /tmp
            - /root/.cache
        volumes:
            # Mount your rclone config
            - type: bind
              source: ${RCLONE_CONFIG_DIR}
              target: /config/rclone
              read_only: true
              bind:
                  create_host_path: false
            # Mount the Maccy folder (sandboxed app path)
            - type: bind
              source: ${MACCY_DATA_DIR}
              target: /data
              read_only: true
              bind:
                  create_host_path: false
            - type: bind
              source: ./sync.sh
              target: /sync.sh
              read_only: true
              bind:
                  create_host_path: false
            - type: bind
              source: ./logs
              target: /logs
              bind:
                  create_host_path: true
        environment:
            - TZ=${TZ}
            - RCLONE_CONFIG_PASS=${RCLONE_CONFIG_PASS}
        entrypoint: ["/bin/sh", "/sync.sh"]
