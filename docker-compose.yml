services:
    maccy-gdrive:
        image: rclone/rclone:1.73.3
        container_name: maccy_sync_worker
        restart: unless-stopped
        init: true
        security_opt:
            - no-new-privileges:true
        cap_drop:
            - ALL
        read_only: true
        tmpfs:
            - /tmp
            - /root/.cache
        volumes:
            # Mount your rclone config
            - type: bind
              source: ${RCLONE_CONFIG_DIR}
              target: /config/rclone
              read_only: true
              bind:
                  create_host_path: false
            # Mount the Maccy folder (sandboxed app path)
            - type: bind
              source: ${MACCY_DATA_DIR}
              target: /data
              read_only: true
              bind:
                  create_host_path: false
            - type: bind
              source: ./sync.sh
              target: /sync.sh
              read_only: true
              bind:
                  create_host_path: false
            - type: bind
              source: ./logs
              target: /logs
              bind:
                  create_host_path: true
        environment:
            - TZ=${TZ}
            - RCLONE_CONFIG_PASS=${RCLONE_CONFIG_PASS}
            - SYNC_INTERVAL_SECONDS=${SYNC_INTERVAL_SECONDS:-1800}
            - RETRY_WAIT_SECONDS=${RETRY_WAIT_SECONDS:-1800}
            - MAX_FAIL_STREAK=${MAX_FAIL_STREAK:-48}
            - HEALTH_MAX_LAG_SECONDS=${HEALTH_MAX_LAG_SECONDS:-86400}
            - HEALTH_STARTUP_GRACE_SECONDS=${HEALTH_STARTUP_GRACE_SECONDS:-3600}
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "if test -f /tmp/last_success_epoch; then now=$$(date +%s); last=$$(cat /tmp/last_success_epoch); [ $$((now-last)) -lt $${HEALTH_MAX_LAG_SECONDS:-86400} ]; else test -f /tmp/start_epoch && now=$$(date +%s) && start=$$(cat /tmp/start_epoch) && [ $$((now-start)) -lt $${HEALTH_STARTUP_GRACE_SECONDS:-3600} ]; fi",
                ]
            interval: 60s
            timeout: 5s
            retries: 3
            start_period: 120s
        entrypoint: ["/bin/sh", "/sync.sh"]
